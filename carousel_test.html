<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carousel Debug Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0C0E12; color: #EDE4D0; font-family: sans-serif; padding: 24px; }
h2 { color: #C8884A; margin: 24px 0 8px; font-size: 13px; letter-spacing: .2em; text-transform: uppercase; }
.wrap { overflow: hidden; width: 100%; border: 1px solid rgba(255,255,255,.1); }
.track { display: flex; transition: transform .4s; }
.slide { background: #1A1E24; padding: 20px; display: flex; gap: 12px; align-items: center; }
.slide-img { width: 200px; height: 200px; background: #2A2E34; flex-shrink: 0;
  clip-path: polygon(16px 0%, 100% 0%, 100% 100%, 0% 100%, 0% 16px);
  border-radius: 0 0 14px 0; display: flex; align-items: center; justify-content: center;
  color: #C8884A; font-size: 11px; }
.slide-img img { width: 100%; height: 100%; object-fit: contain; padding: 16px; }
.slide-text { flex: 1; }
.nav { display: flex; gap: 12px; margin-top: 8px; align-items: center; }
button { background: #1A1E24; border: 1px solid rgba(255,255,255,.1); color: #EDE4D0;
  padding: 6px 14px; cursor: pointer; font-size: 14px; }
.counter { font-size: 11px; color: #606870; }
.status { margin-top: 8px; font-size: 11px; color: #606870; }
.ok { color: #4CAF50; } .fail { color: #f44336; }
</style>
</head>
<body>

<h2>Test 1 — onderdelen images (fotos/handleiding/)</h2>
<div id="imgTests" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px"></div>

<h2>Test 2 — carousel werking</h2>
<div class="wrap" id="wrap">
  <div class="track" id="track">
    <div class="slide">
      <div class="slide-img"><img src="fotos/handleiding/part_01_kap.png" alt="Kap" id="t1"></div>
      <div class="slide-text"><b>Kap</b><br><span class="status" id="s1">laden...</span></div>
    </div>
    <div class="slide">
      <div class="slide-img"><img src="fotos/handleiding/part_02_vleugel_L.png" alt="Vleugel L" id="t2"></div>
      <div class="slide-text"><b>Vleugel L</b><br><span class="status" id="s2">laden...</span></div>
    </div>
    <div class="slide">
      <div class="slide-img"><img src="fotos/handleiding/stap_1.png" alt="Stap 1" id="t3"></div>
      <div class="slide-text"><b>Stap 1</b><br><span class="status" id="s3">laden...</span></div>
    </div>
    <div class="slide">
      <div class="slide-img" style="background:linear-gradient(135deg, #D8CFC4, #C8B89A)">
        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
          data-folder="materiaal/basic" id="t4" onerror="this.style.display='none'">
      </div>
      <div class="slide-text"><b>Materiaal Basic</b><br><span class="status" id="s4">laden...</span></div>
    </div>
  </div>
</div>
<div class="nav">
  <button id="prev">←</button>
  <span class="counter" id="counter">1 / 4</span>
  <button id="next">→</button>
</div>

<h2>fotos.json check</h2>
<pre id="jsonOut" style="font-size:10px;color:#606870;max-height:200px;overflow:auto;background:#1A1E24;padding:12px"></pre>

<script>
// Test image loading
['t1','t2','t3','t4'].forEach((id, i) => {
  const img = document.getElementById(id);
  const status = document.getElementById('s' + (i+1));
  img.onload = () => { status.textContent = '✓ geladen (' + img.naturalWidth + '×' + img.naturalHeight + ')'; status.className = 'status ok'; };
  img.onerror = () => { status.textContent = '✗ 404 - bestand niet gevonden'; status.className = 'status fail'; };
  if (img.complete && img.naturalWidth > 0) { status.textContent = '✓ al geladen'; status.className = 'status ok'; }
});

// Carousel
const wrap = document.getElementById('wrap');
const track = document.getElementById('track');
const slides = track.querySelectorAll('.slide');
const counter = document.getElementById('counter');
let cur = 0;
function setW() { const w = wrap.offsetWidth; slides.forEach(s => { s.style.width = w+'px'; s.style.flex='0 0 '+w+'px'; }); go(cur, false); }
function go(n, anim) {
  cur = (n + slides.length) % slides.length;
  track.style.transition = anim===false ? 'none' : 'transform .4s';
  track.style.transform = 'translateX(-'+(cur * wrap.offsetWidth)+'px)';
  counter.textContent = (cur+1) + ' / ' + slides.length;
}
document.getElementById('prev').onclick = () => go(cur-1);
document.getElementById('next').onclick = () => go(cur+1);
setW(); window.addEventListener('resize', setW);

// fotos.json check
fetch('fotos.json').then(r=>r.json()).then(d => {
  const keys = Object.keys(d);
  const out = keys.map(k => k + ': ' + (d[k]||[]).length + ' foto(s)').join('\n');
  document.getElementById('jsonOut').textContent = out || '(leeg)';
  
  // Also test materiaal/basic img
  const mat = document.getElementById('t4');
  if (d['materiaal/basic'] && d['materiaal/basic'].length) {
    mat.src = 'fotos/materiaal/basic/' + d['materiaal/basic'][0];
  } else {
    document.getElementById('s4').textContent = '⚠ materiaal/basic niet in fotos.json';
    document.getElementById('s4').className = 'status fail';
  }
}).catch(e => {
  document.getElementById('jsonOut').textContent = '✗ fotos.json niet gevonden: ' + e;
});
</script>
</body>
</html>
