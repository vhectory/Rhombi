# ── Rhombi — netlify.toml ──────────────────────────────────────────────
# Zet dit bestand in de root van je site-map (naast index.html).
# Deploy via: Netlify Dashboard → Sites → "Deploy manually" (sleep de map erin)
# Of via CLI: netlify deploy --prod --dir .

[build]
  # Geen build-stap nodig — pure static HTML/JS/CSS
  publish = "."

# ── Redirect: / → index.html ──────────────────────────────────────────
[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

# ── SPA-fallback: onbekende paden → index.html ─────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ───────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "SAMEORIGIN"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

# viewer.html mag in iframe op rhombi.nl (voor de configurator-embed)
[[headers]]
  for = "/viewer.html"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors 'self' https://rhombi.nl https://*.rhombi.nl"

# ── Cache: statische assets lang cachen ───────────────────────────────
[[headers]]
  for = "/*.glb"
  [headers.values]
    Cache-Control = "no-transform, public, max-age=31536000"
    Content-Type = "model/gltf-binary"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/fotos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML nooit cachen zodat updates direct zichtbaar zijn
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
