<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rhombi — 3D Configurator (Babylon)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#C8884A;--cream:#EDE4D0;--dark:#0C0E12;--dark2:#12151A;--dark3:#1A1E26;
  --text:#A8ADB8;--text-dim:#606870;--font-mono:"Space Mono",monospace;--font-sans:"Space Grotesk",sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--cream);}
#renderCanvas{width:100%;height:100%;touch-action:none;outline:none;}

/* ── TOP BAR ── */
.bar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(to bottom,rgba(18,21,26,.95),transparent);pointer-events:none;}
.bar-left{display:flex;align-items:center;gap:12px;pointer-events:all;}
.bar-title{font-family:var(--font-sans);font-size:13px;font-weight:300;letter-spacing:.12em;color:var(--cream);opacity:.7;}
.bar-right{display:flex;gap:8px;pointer-events:all;}
.bar-btn{background:rgba(22,26,32,.85);border:1px solid rgba(255,255,255,.08);color:var(--text);font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:all .2s;}
.bar-btn:hover,.bar-btn.on{border-color:rgba(200,136,74,.5);color:var(--amber);}
.back{font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;padding:7px 12px;border:1px solid rgba(255,255,255,.06);transition:color .2s;}
.back:hover{color:var(--amber);}

/* ── SIDE PANEL ── */
.panel{position:fixed;right:0;top:0;bottom:0;width:30%;min-width:260px;background:rgba(20,24,30,.97);backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;overflow-y:auto;z-index:30;padding-bottom:24px;}
.panel::-webkit-scrollbar{width:2px}.panel::-webkit-scrollbar-thumb{background:rgba(200,136,74,.2)}
.ps{padding:16px 18px 8px;border-bottom:1px solid rgba(255,255,255,.04);}
.pl{font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;color:var(--amber);text-transform:uppercase;margin-bottom:8px;display:block;}
.pt{font-size:18px;font-weight:300;line-height:1.2;margin-bottom:2px;}
.pp{font-size:9px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:.08em;}

/* Variant knoppen */
.vbtn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 14px;min-width:72px;background:rgba(22,26,32,.92);border:1px solid rgba(255,255,255,.07);color:var(--text-dim);cursor:pointer;transition:all .2s;font-family:var(--font-mono);}
.vbtn.on{border-color:var(--amber);color:var(--amber);background:rgba(200,136,74,.1);}
.vbtn-icon{font-size:18px;line-height:1;}
.vbtn-lbl{font-size:8px;letter-spacing:.12em;text-transform:uppercase;}
.vbar{display:flex;flex-wrap:wrap;gap:4px;padding:12px 18px;}

/* Materiaal knoppen */
.pb{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--dark3);border:1px solid transparent;color:var(--text);font-family:var(--font-sans);font-size:12px;cursor:pointer;transition:all .16s;width:100%;margin-bottom:3px;}
.pb:hover{border-color:rgba(200,136,74,.4);color:var(--cream);}
.pb.on{border-color:var(--amber);color:var(--cream);background:rgba(200,136,74,.10);border-left:3px solid var(--amber);}
.pb-desc{font-size:9px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:.06em;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:background .3s;}

/* Kleurswatches */
.sw{aspect-ratio:1;cursor:pointer;border:2px solid transparent;transition:all .16s;position:relative;}
.sw.on{border-color:var(--amber);transform:scale(1.08);}
.sw:hover{transform:scale(1.05);}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:4px 0;}
.cb{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--dark3);border:1px solid rgba(255,255,255,.05);color:var(--text);font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:3px;width:100%;}
.cb.on{background:rgba(200,136,74,.1);border-color:var(--amber);color:var(--amber);}

/* ── LAADSCHERM ── */
#loading{position:fixed;inset:0;right:30%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--dark);z-index:50;gap:14px;transition:opacity .5s;}
#loading.gone{opacity:0;pointer-events:none;}
.lr{width:34px;height:34px;border:1px solid rgba(200,136,74,.2);border-top-color:var(--amber);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.lt{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);}

/* ── MOBILE ── */
@media(max-width:1024px){
  html,body{overflow-y:auto;height:auto;min-height:100%;}
  #renderCanvas{width:100vw;height:100vw;display:block;}
  .bar{right:0;}
  .panel{position:relative;width:100%;min-width:0;border-left:none;border-top:1px solid rgba(255,255,255,.06);z-index:1;}
  #loading{right:0;width:100vw;height:100vw;}
  .vbar{padding:8px 12px;}
  .vbtn{min-width:62px;padding:8px 10px;}
}
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>

<div id="loading"><div class="lr"></div><p class="lt">Configurator laden...</p></div>

<div class="bar">
  <div class="bar-left">
    <a href="index.html" class="back">← Terug</a>
    <span class="bar-title">◆ 3D CONFIGURATOR <span style="opacity:.4;font-size:10px">BABYLON</span></span>
  </div>
  <div class="bar-right">
    <button class="bar-btn on" id="bLight" onclick="toggleLight()">Lamp aan</button>
    <button class="bar-btn" id="bAR" onclick="startAR()" style="display:none">◉ AR</button>
  </div>
</div>

<div class="panel" id="panel">
  <div class="ps">
    <span class="pl">◆ Model</span>
    <h2 class="pt" id="vtit">Rhombi Tafel</h2>
    <p class="pp" id="vsub">Tafellamp · E14 fitting</p>
  </div>

  <div class="ps">
    <span class="pl">◆ Variant</span>
    <div class="vbar" id="vbar"></div>
  </div>

  <div class="ps" id="ps-mat">
    <span class="pl">◆ Materiaal</span>
    <div id="matList"></div>
  </div>

  <div class="ps" id="ps-kleur">
    <span class="pl">◆ Kleur</span>
    <div style="display:flex;gap:4px;margin-bottom:8px;">
      <button class="cb on" id="selOnderdeel" onclick="setColorTarget('onderdeel')">Onderdeel</button>
      <button class="cb" id="selAlles" onclick="setColorTarget('alles')">Alles</button>
    </div>
    <div class="color-grid" id="colorGrid"></div>
  </div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script>
// ══════════════════════════════════════════════
// RHOMBI BABYLON CONFIGURATOR
// ══════════════════════════════════════════════

const VARIANTS = [
  { id:'tafel',  lbl:'Tafel',  icon:'▢', glb:'glb/rhombi-tafel.glb',
    title:'Rhombi Tafel', sub:'Tafellamp · E14 fitting',
    cam:{alpha:-0.5, beta:1.2, radius:3.5} },
  { id:'accent', lbl:'Accent', icon:'◈', glb:'glb/rhombi-accent.glb',
    title:'Rhombi Accent', sub:'Accentlamp · E14 fitting', yOffset:-0.10,
    cam:{alpha:-0.5, beta:1.1, radius:4.0} },
  { id:'wand',   lbl:'Wand',   icon:'◧', glb:null,
    title:'Rhombi Wand', sub:'Wandlamp · binnenkort' },
];

const MATERIALS = [
  { id:'pla-basic',      nm:'PLA-Basic',      desc:'Standaard · laaglijnen',    roughness:0.48, metalness:0.0, opacity:1.0 },
  { id:'pla-mat',        nm:'PLA-Mat',         desc:'Mat · velvet oppervlak',    roughness:0.88, metalness:0.0, opacity:1.0 },
  { id:'pla-cf',         nm:'PLA-CF',          desc:'Koolstofvezel · geweven',   roughness:0.82, metalness:0.1, opacity:1.0 },
  { id:'pla-nebula',     nm:'PLA-Nebula',      desc:'Glitter · metallic sparkle',roughness:0.42, metalness:0.3, opacity:1.0 },
  { id:'pla-translucent',nm:'PLA-Translucent', desc:'Doorschijnend · glad',      roughness:0.12, metalness:0.0, opacity:0.65 },
];

const COLORS = [
  {n:'Wit',h:'#F2F0EE'},{n:'Lichtroze',h:'#F0D8CC'},{n:'Geel',h:'#F0D800'},{n:'Oranje',h:'#F07010'},
  {n:'Limoen',h:'#90D010'},{n:'Groen',h:'#10B830'},{n:'Felroze',h:'#F04878'},{n:'Magenta',h:'#D01878'},
  {n:'Rood',h:'#C02020'},{n:'Paars',h:'#601880'},{n:'Lichtblauw',h:'#20A0E0'},{n:'Blauw',h:'#1840C8'},
  {n:'Cyaan',h:'#00C8C0'},{n:'Terracotta',h:'#B04830'},{n:'Bruin',h:'#705030'},{n:'Grijs',h:'#888880'},
  {n:'Lichtgrijs',h:'#B0B0A8'},{n:'Donkergrijs',h:'#484848'},{n:'Zwart',h:'#181818'},{n:'Crème',h:'#EEE0B8'},
  {n:'Amber',h:'#C8884A'},{n:'Zand',h:'#D4A868'},{n:'Olijf',h:'#686820'},{n:'Marineblauw',h:'#102070'},
];

// ── State ──
let curVariant = null;
let curMat = 'pla-mat';
let curColor = '#F2F0EE';
let colorTarget = 'onderdeel';
let curMeshes = {};       // { partId: [Mesh, ...] }
let selPart = null;       // geselecteerd onderdeel
let lampOn = true;
let glbCache = {};

// ── Babylon setup ──
const canvas = document.getElementById('renderCanvas');
const engine = new BABYLON.Engine(canvas, true, {
  preserveDrawingBuffer: true,
  stencil: true,
  alpha: true
});

const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.047, 0.055, 0.071, 1); // #0C0E12

// ── Camera ──
const camera = new BABYLON.ArcRotateCamera('cam', -0.5, 1.2, 3.5, BABYLON.Vector3.Zero(), scene);
camera.attachControl(canvas, true);
camera.lowerRadiusLimit = 0.5;
camera.upperRadiusLimit = 10;
camera.wheelPrecision = 50;
camera.pinchPrecision = 50;
camera.minZ = 0.01;

// ── Verlichting ──
// Omgevingslicht (zacht)
const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0,1,0), scene);
hemi.intensity = 0.3;
hemi.diffuse = new BABYLON.Color3(0.78, 0.71, 0.6);
hemi.groundColor = new BABYLON.Color3(0.1, 0.09, 0.07);

// Key light (warm)
const key = new BABYLON.DirectionalLight('key', new BABYLON.Vector3(-1,-1.5,-0.5), scene);
key.intensity = 1.2;
key.diffuse = new BABYLON.Color3(1.0, 0.95, 0.8);
key.position = new BABYLON.Vector3(3, 5, 2);
key.shadowEnabled = false;

// Fill light (koel)
const fill = new BABYLON.DirectionalLight('fill', new BABYLON.Vector3(1,-0.5,0.5), scene);
fill.intensity = 0.5;
fill.diffuse = new BABYLON.Color3(0.5, 0.6, 0.75);

// Lamp gloed (point light, kan aan/uit)
const lampLight = new BABYLON.PointLight('lamp', new BABYLON.Vector3(0, 0.15, 0), scene);
lampLight.intensity = 1.5;
lampLight.diffuse = new BABYLON.Color3(1.0, 0.9, 0.6);
lampLight.range = 3;

// ── Environment ──
const envTex = BABYLON.CubeTexture.CreateFromPrefilteredData(
  'https://assets.babylonjs.com/environments/environmentSpecular.env', scene);
scene.environmentTexture = envTex;
scene.environmentIntensity = 0.4;

// ── Gradient achtergrond via background mesh ──
(function(){
  const bg = BABYLON.MeshBuilder.CreateSphere('bg', {diameter:40, sideOrientation:BABYLON.Mesh.BACKSIDE}, scene);
  const bgMat = new BABYLON.StandardMaterial('bgMat', scene);
  bgMat.emissiveColor = new BABYLON.Color3(0.06, 0.07, 0.09);
  bgMat.disableLighting = true;
  bgMat.backFaceCulling = false;
  bg.material = bgMat;
  bg.renderingGroupId = 0;
  bg.isPickable = false;
})();

// ── Lamp container (voor positiebeheer) ──
const lampRoot = new BABYLON.TransformNode('lampRoot', scene);

// ── Materiaal helpers ──
function hexToColor3(hex){
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  return new BABYLON.Color3(r,g,b);
}

function applyMaterialToMesh(mesh, matId, colorHex){
  const matDef = MATERIALS.find(m=>m.id===matId) || MATERIALS[0];
  const color = hexToColor3(colorHex);

  let mat = mesh.material;
  if(!mat || mat.id !== 'pbr_'+mesh.uniqueId){
    mat = new BABYLON.PBRMaterial('pbr_'+mesh.uniqueId, scene);
    mesh.material = mat;
  }
  mat.albedoColor = color;
  mat.roughness = matDef.roughness;
  mat.metallic = matDef.metalness;
  mat.alpha = matDef.opacity;
  if(matDef.opacity < 1){
    mat.transparencyMode = BABYLON.PBRMaterial.PBRMATERIAL_ALPHABLEND;
  } else {
    mat.transparencyMode = BABYLON.PBRMaterial.PBRMATERIAL_OPAQUE;
  }
  mat.environmentIntensity = 0.5;
}

function applyToAll(matId, colorHex){
  Object.values(curMeshes).forEach(meshArr=>{
    meshArr.forEach(m=>applyMaterialToMesh(m, matId, colorHex));
  });
}

function applyToPart(partId, matId, colorHex){
  const arr = curMeshes[partId];
  if(!arr) return;
  arr.forEach(m=>applyMaterialToMesh(m, matId, colorHex));
}

// ── GLB laden ──
async function loadVariant(variant){
  if(!variant.glb){
    document.getElementById('vtit').textContent = variant.title;
    document.getElementById('vsub').textContent = variant.sub;
    return;
  }

  document.getElementById('loading').classList.remove('gone');

  // Verwijder huidige meshes
  Object.values(curMeshes).forEach(arr=>arr.forEach(m=>{m.dispose();}));
  curMeshes = {};

  try {
    const result = await BABYLON.SceneLoader.ImportMeshAsync('', '', variant.glb, scene);
    const meshes = result.meshes.filter(m=>m.name!=='__root__' && m.getTotalVertices()>0);

    // Centreer model
    let min = new BABYLON.Vector3(Infinity,Infinity,Infinity);
    let max = new BABYLON.Vector3(-Infinity,-Infinity,-Infinity);
    meshes.forEach(m=>{
      m.computeWorldMatrix(true);
      const bi = m.getBoundingInfo();
      min = BABYLON.Vector3.Minimize(min, bi.boundingBox.minimumWorld);
      max = BABYLON.Vector3.Maximize(max, bi.boundingBox.maximumWorld);
    });
    const center = BABYLON.Vector3.Center(min, max);
    meshes.forEach(m=>{
      m.parent = lampRoot;
      m.position.subtractInPlace(center);
      if(variant.yOffset) m.position.y += variant.yOffset;
    });

    // Groepeer op naam
    meshes.forEach(m=>{
      const id = m.name.replace(/_[ta]/,''); // alias stripping
      if(!curMeshes[id]) curMeshes[id] = [];
      curMeshes[id].push(m);
    });

    // Lamp licht positie
    lampLight.position = new BABYLON.Vector3(0, 0.15, 0);

    // Stel initieel materiaal in
    applyToAll(curMat, curColor);

    // Camera animatie
    const cam = variant.cam || {alpha:-0.5, beta:1.2, radius:3.5};
    BABYLON.Animation.CreateAndStartAnimation('camAlpha','camera','alpha',30,30,camera.alpha,cam.alpha,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
    BABYLON.Animation.CreateAndStartAnimation('camBeta','camera','beta',30,30,camera.beta,cam.beta,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
    BABYLON.Animation.CreateAndStartAnimation('camR','camera','radius',30,30,camera.radius,cam.radius,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);

    // UI update
    document.getElementById('vtit').textContent = variant.title;
    document.getElementById('vsub').textContent = variant.sub;
    buildPartList(variant);

    // Selecteer eerste onderdeel
    selPart = Object.keys(curMeshes)[0] || null;
    highlightSelected();

  } catch(e){
    console.error('Load error:', e);
  }

  document.getElementById('loading').classList.add('gone');
}

// ── Onderdeel selectie via klikken ──
scene.onPointerObservable.add(info=>{
  if(info.type !== BABYLON.PointerEventTypes.POINTERPICK) return;
  const mesh = info.pickInfo.pickedMesh;
  if(!mesh) return;
  // Vind welk part dit is
  for(const [id, arr] of Object.entries(curMeshes)){
    if(arr.includes(mesh)){
      selPart = id;
      highlightSelected();
      updateColorGrid();
      break;
    }
  }
});

function highlightSelected(){
  // Subtiele outline via selected material tint
  Object.entries(curMeshes).forEach(([id, arr])=>{
    arr.forEach(m=>{
      if(m.material){
        m.material.emissiveColor = id===selPart
          ? new BABYLON.Color3(0.08,0.05,0.02)
          : new BABYLON.Color3(0,0,0);
      }
    });
  });
}

// ── UI bouwen ──
function buildVariantBar(){
  const el = document.getElementById('vbar');
  el.innerHTML = '';
  VARIANTS.forEach(v=>{
    const btn = document.createElement('button');
    btn.className = 'vbtn' + (curVariant&&curVariant.id===v.id?' on':'');
    btn.innerHTML = `<span class="vbtn-icon">${v.icon}</span><span class="vbtn-lbl">${v.lbl}</span>`;
    if(!v.glb) btn.style.opacity = '0.4';
    btn.onclick = ()=>{ if(!v.glb) return; setVariant(v); };
    el.appendChild(btn);
  });
}

function buildMatList(){
  const el = document.getElementById('matList');
  el.innerHTML = '';
  MATERIALS.forEach(m=>{
    const btn = document.createElement('button');
    btn.className = 'pb' + (curMat===m.id?' on':'');
    btn.innerHTML = `<div><div style="font-size:12px">${m.nm}</div><div class="pb-desc">${m.desc}</div></div><div class="dot" style="background:${curMat===m.id?'var(--amber)':'rgba(255,255,255,.15)'}"></div>`;
    btn.onclick = ()=>{ curMat=m.id; buildMatList(); applyCurrentMat(); };
    el.appendChild(btn);
  });
}

function buildPartList(variant){
  // Voeg onderdeel-selector toe voor kleurpanel
  // Gewoon de meshgroepen tonen als selectie
}

function buildColorGrid(){
  const el = document.getElementById('colorGrid');
  el.innerHTML = '';
  COLORS.forEach(clr=>{
    const sw = document.createElement('div');
    sw.className = 'sw' + (curColor===clr.h?' on':'');
    sw.style.background = clr.h;
    sw.title = clr.n;
    sw.onclick = ()=>{ curColor=clr.h; buildColorGrid(); applyCurrentMat(); };
    el.appendChild(sw);
  });
}

function updateColorGrid(){ buildColorGrid(); }

function applyCurrentMat(){
  if(colorTarget==='alles'){
    applyToAll(curMat, curColor);
  } else if(selPart){
    applyToPart(selPart, curMat, curColor);
  }
  highlightSelected();
}

function setColorTarget(t){
  colorTarget = t;
  document.getElementById('selOnderdeel').classList.toggle('on', t==='onderdeel');
  document.getElementById('selAlles').classList.toggle('on', t==='alles');
}

function setVariant(v){
  curVariant = v;
  buildVariantBar();
  loadVariant(v);
}

function toggleLight(){
  lampOn = !lampOn;
  lampLight.intensity = lampOn ? 1.5 : 0;
  document.getElementById('bLight').classList.toggle('on', lampOn);
  document.getElementById('bLight').textContent = lampOn ? 'Lamp aan' : 'Lamp uit';
}

// ══════════════════════════════════════════════
// AR — Babylon WebXR (veel eenvoudiger dan Three.js)
// ══════════════════════════════════════════════
let xrHelper = null;
let arReticle = null;
let arPlaced = false;
let arRotating = {l:false, r:false};
let arRotTick = null;

// Check AR support bij laden
(async()=>{
  if(!navigator.xr) return;
  const ok = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if(ok) document.getElementById('bAR').style.display='flex';
})();

async function startAR(){
  try {
    // ── Maak AR overlay UI ──
    const overlay = document.createElement('div');
    overlay.id = 'arOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9000;pointer-events:none';
    overlay.innerHTML = `
      <div id="arHint" style="position:absolute;top:24px;left:50%;transform:translateX(-50%);font-family:Space Mono,monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#fff;text-shadow:0 1px 8px #000;padding:6px 14px;background:rgba(0,0,0,.45);pointer-events:none;white-space:nowrap">Richt op een vlak</div>
      <div style="position:absolute;bottom:0;left:0;right:0;padding:16px 20px calc(16px + env(safe-area-inset-bottom));background:rgba(12,14,18,.88);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;gap:10px;pointer-events:all">
        <div style="display:flex;gap:8px">
          <button id="arClose" style="background:none;border:1px solid rgba(255,255,255,.2);color:#EDE4D0;font-family:Space Mono,monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:12px 18px;-webkit-tap-highlight-color:transparent">✕</button>
          <button id="arReset" style="display:none;background:none;border:1px solid rgba(200,136,74,.4);color:#C8884A;font-family:Space Mono,monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:12px 18px;-webkit-tap-highlight-color:transparent">↺</button>
        </div>
        <button id="arPlace" style="display:none;flex:1;max-width:200px;background:rgba(200,136,74,.95);border:none;color:#0C0E12;font-family:Space Mono,monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:14px 0;-webkit-tap-highlight-color:transparent">Hier plaatsen</button>
        <div id="arRotBtns" style="display:none;gap:8px">
          <button id="arRotL" style="width:52px;height:52px;background:rgba(200,136,74,.12);border:1px solid rgba(200,136,74,.5);color:#EDE4D0;font-size:22px;border-radius:3px;touch-action:none;-webkit-tap-highlight-color:transparent">↺</button>
          <button id="arRotR" style="width:52px;height:52px;background:rgba(200,136,74,.12);border:1px solid rgba(200,136,74,.5);color:#EDE4D0;font-size:22px;border-radius:3px;touch-action:none;-webkit-tap-highlight-color:transparent">↻</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    // ── Babylon WebXR Experience ──
    // Dit is het grote voordeel: één aanroep regelt camera passthrough,
    // reference spaces, render loop en sessie beheer
    xrHelper = await scene.createDefaultXRExperienceAsync({
      uiOptions: { sessionMode: 'immersive-ar', referenceSpaceType: 'local-floor' },
      optionalFeatures: true,  // activeer alle beschikbare features automatisch
    });

    if(!xrHelper.baseExperience){
      throw new Error('WebXR niet ondersteund op dit apparaat');
    }

    const fm = xrHelper.baseExperience.featuresManager;

    // ── Hit-test feature (automatisch via Babylon) ──
    let hitTestFeature;
    try {
      hitTestFeature = fm.enableFeature(BABYLON.WebXRHitTest, 'latest', {
        entityTypes: ['plane','mesh']
      });
    } catch(e){ console.warn('hit-test:', e.message); }

    // ── Reticle (amber ring op het vlak) ──
    arReticle = BABYLON.MeshBuilder.CreateTorus('arReticle', {
      diameter: 0.16, thickness: 0.012, tessellation: 48
    }, scene);
    const rMat = new BABYLON.StandardMaterial('rMat', scene);
    rMat.emissiveColor = new BABYLON.Color3(0.78, 0.53, 0.29);
    rMat.disableLighting = true;
    arReticle.material = rMat;
    arReticle.isPickable = false;
    arReticle.setEnabled(false);
    arReticle.renderingGroupId = 1;

    // ── Achtergrond verbergen ──
    const bgMesh = scene.getMeshByName('bg');
    if(bgMesh) bgMesh.setEnabled(false);
    scene.clearColor = new BABYLON.Color4(0, 0, 0, 0);
    scene.environmentIntensity = 0.15; // minder env in AR

    // Lamp verbergen tot plaatsing
    lampRoot.setEnabled(false);
    arPlaced = false;

    // ── Hit-test resultaten: reticle volgt vlak ──
    if(hitTestFeature){
      hitTestFeature.onHitTestResultObservable.add(results => {
        if(arPlaced) return;
        if(results.length > 0){
          arReticle.setEnabled(true);
          arReticle.position.copyFrom(results[0].position);
          // Normaal vector voor rotatie op schuin vlak
          if(results[0].transformationMatrix){
            const mat = results[0].transformationMatrix;
            BABYLON.Matrix.DecomposeLHToRef(
              new BABYLON.Vector3(), new BABYLON.Quaternion(), new BABYLON.Vector3(), mat
            );
          }
          document.getElementById('arPlace').style.display = 'block';
          document.getElementById('arHint').textContent = 'Vlak gevonden — tik Hier plaatsen';
        } else {
          arReticle.setEnabled(false);
          document.getElementById('arPlace').style.display = 'none';
          document.getElementById('arHint').textContent = 'Richt op een vlak';
        }
      });
    }

    // ── Plaatsen via knop ──
    document.getElementById('arPlace').onclick = () => {
      if(!arReticle.isEnabled()) return;

      // Lamp plaatsen op reticle positie
      lampRoot.setEnabled(true);
      lampRoot.position.copyFrom(arReticle.position);

      // Onderkant op vlak
      const bb = lampRoot.getHierarchyBoundingVectors();
      lampRoot.position.y += lampRoot.position.y - bb.min.y;
      // Horizontaal centreren
      lampRoot.position.x += lampRoot.position.x - (bb.min.x+bb.max.x)/2;
      lampRoot.position.z += lampRoot.position.z - (bb.min.z+bb.max.z)/2;

      arPlaced = true;
      arReticle.setEnabled(false);

      document.getElementById('arPlace').style.display = 'none';
      document.getElementById('arReset').style.display = 'block';
      document.getElementById('arRotBtns').style.display = 'flex';
      document.getElementById('arHint').textContent = '↺↻ Draai met knoppen';

      // ── Draai game loop ──
      const ROT = 0.025;
      function rotTick(){
        if(!arPlaced){ arRotTick=null; return; }
        if(arRotating.l) lampRoot.rotation.y += ROT;
        if(arRotating.r) lampRoot.rotation.y -= ROT;
        arRotTick = requestAnimationFrame(rotTick);
      }
      if(arRotTick) cancelAnimationFrame(arRotTick);
      arRotTick = requestAnimationFrame(rotTick);

      function hold(id, key){
        const el = document.getElementById(id); if(!el) return;
        el.addEventListener('touchstart',e=>{e.preventDefault();arRotating[key]=true;},{passive:false});
        el.addEventListener('touchend',  e=>{e.preventDefault();arRotating[key]=false;},{passive:false});
        el.addEventListener('mousedown', ()=>arRotating[key]=true);
        el.addEventListener('mouseup',   ()=>arRotating[key]=false);
        el.addEventListener('mouseleave',()=>arRotating[key]=false);
      }
      hold('arRotL','l'); hold('arRotR','r');
    };

    // ── Reset plaatsing ──
    document.getElementById('arReset').onclick = () => {
      arPlaced = false;
      lampRoot.setEnabled(false);
      if(arRotTick){ cancelAnimationFrame(arRotTick); arRotTick=null; }
      arRotating = {l:false,r:false};
      arReticle.setEnabled(false);
      document.getElementById('arReset').style.display = 'none';
      document.getElementById('arRotBtns').style.display = 'none';
      document.getElementById('arHint').textContent = 'Richt op een vlak';
    };

    // ── Sluiten ──
    document.getElementById('arClose').onclick = () => {
      xrHelper.baseExperience.exitXRAsync();
    };

    // ── Herstel bij sessie einde ──
    xrHelper.baseExperience.onStateChangedObservable.add(state => {
      if(state === BABYLON.WebXRState.NOT_IN_XR){
        overlay.remove();
        if(bgMesh) bgMesh.setEnabled(true);
        scene.clearColor = new BABYLON.Color4(0.047, 0.055, 0.071, 1);
        scene.environmentIntensity = 0.4;
        lampRoot.setEnabled(true);
        lampRoot.position = BABYLON.Vector3.Zero();
        lampRoot.rotation = BABYLON.Vector3.Zero();
        if(arReticle){ arReticle.dispose(); arReticle=null; }
        if(arRotTick){ cancelAnimationFrame(arRotTick); arRotTick=null; }
        arPlaced = false; arRotating = {l:false,r:false};
        xrHelper = null;
      }
    });

    // ── Start AR ──
    await xrHelper.baseExperience.enterXRAsync('immersive-ar', 'local-floor');

  } catch(e){
    console.error('AR:', e.name, e.message);
    document.getElementById('arOverlay')?.remove();
    if(arReticle){ arReticle.dispose(); arReticle=null; }
    lampRoot.setEnabled(true);
    scene.clearColor = new BABYLON.Color4(0.047, 0.055, 0.071, 1);
    if(bgMesh) bgMesh.setEnabled(true);
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(12,14,18,.95);border:1px solid rgba(200,136,74,.4);color:#EDE4D0;font-family:Space Mono,monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:12px 24px;z-index:9999;max-width:85vw;text-align:center';
    toast.textContent = e.name + ': ' + e.message;
    document.body.appendChild(toast); setTimeout(()=>toast.remove(), 6000);
  }
}

// ── Variant wissel van parent ──
window.addEventListener('message', e=>{
  if(e.data?.type==='rhombi-setvariant'){
    const v = VARIANTS.find(v=>v.id===e.data.variant);
    if(v) setVariant(v);
  }
});

// ── Engine render loop ──
engine.runRenderLoop(()=>scene.render());
window.addEventListener('resize',()=>engine.resize());

// ── Init ──
buildVariantBar();
buildMatList();
buildColorGrid();
setVariant(VARIANTS[0]);
</script>
</body>
</html>
